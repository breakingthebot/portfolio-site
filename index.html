<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Applies a stored theme choice before first paint, so switching
         pages/reloading never flashes the OS-default theme first if the
         visitor explicitly picked the other one. "theme" here must match
         THEME_STORAGE_KEY in src/services/themeService.js. -->
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
        }
      })();
    </script>
    <title>Breaking the Bot — Portfolio</title>
    <meta name="description" content="Breaking the Bot's portfolio: projects, blog, and contact." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Breaking the Bot" />
    <meta property="og:url" content="https://portfolio-site-three-blush-83.vercel.app/" />
    <meta property="og:title" content="Breaking the Bot — Portfolio" />
    <meta
      property="og:description"
      content="28 years in operations and automation — now learning AI in public, one build at a time."
    />
    <meta property="og:image" content="https://portfolio-site-three-blush-83.vercel.app/og-image.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Breaking the Bot — Portfolio" />
    <meta
      name="twitter:description"
      content="28 years in operations and automation — now learning AI in public, one build at a time."
    />
    <meta name="twitter:image" content="https://portfolio-site-three-blush-83.vercel.app/og-image.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
